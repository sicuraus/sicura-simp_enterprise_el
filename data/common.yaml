---
lookup_options:
  '^simp_enterprise_el::\w+$':
    merge:
      strategy: deep
  simp_enterprise_el::sshd::env:
    merge:
      strategy: hash
  simp_enterprise_el::sshd::env_exclude:
    merge:
      strategy: unique
  simp_enterprise_el::users::sa_exclude:
    merge:
      strategy: unique
  simp_enterprise_el::mountpoints::required_options:
    merge:
      strategy: deep
  simp_enterprise_el::mountpoints::removable_options:
    merge:
      strategy: unique
  simp_enterprise_el::logfiles::ignore:
    merge:
      strategy: unique
  simp_enterprise_el::grub::defaults:
    merge:
      strategy: deep

simp_enterprise_el::files: {}
simp_enterprise_el::file_defaults: {}
simp_enterprise_el::file_overrides: {}

simp_enterprise_el::file_lines: {}
simp_enterprise_el::file_line_defaults: {}
simp_enterprise_el::file_line_overrides: {}

simp_enterprise_el::firewalld_rich_rules: {}
simp_enterprise_el::firewalld_rich_rules_defaults: {}
simp_enterprise_el::firewalld_rich_rules_overrides: {}

simp_enterprise_el::ini_settings: {}
simp_enterprise_el::ini_setting_defaults: {}
simp_enterprise_el::ini_setting_overrides: {}

simp_enterprise_el::ini_subsettings: {}
simp_enterprise_el::ini_subsetting_defaults: {}
simp_enterprise_el::ini_subsetting_overrides: {}

simp_enterprise_el::kernel_parameters: {}
simp_enterprise_el::kernel_parameter_defaults: {}
simp_enterprise_el::kernel_parameter_overrides: {}

simp_enterprise_el::keytabs::enforce: false

simp_enterprise_el::packages: {}
simp_enterprise_el::package_defaults: {}
simp_enterprise_el::package_overrides: {}

simp_enterprise_el::services: {}
simp_enterprise_el::service_defaults: {}
simp_enterprise_el::service_overrides: {}

simp_enterprise_el::shellvars: {}
simp_enterprise_el::shellvars_defaults: {}
simp_enterprise_el::shellvars_overrides: {}

simp_enterprise_el::ssh_configs: {}
simp_enterprise_el::ssh_config_defaults: {}
simp_enterprise_el::ssh_config_overrides: {}

simp_enterprise_el::sysctl_flags: {}
simp_enterprise_el::sysctl_flag_defaults: {}
simp_enterprise_el::sysctl_flag_overrides: {}

simp_enterprise_el::sshd::env_file: '/etc/sysconfig/sshd'
simp_enterprise_el::sshd::env: {}
simp_enterprise_el::sshd::env_exclude: []

simp_enterprise_el::managed_users: {}
simp_enterprise_el::managed_user_defaults: {}
simp_enterprise_el::managed_user_overrides: {}

simp_enterprise_el::users::empty_shadow: false
simp_enterprise_el::users::lock: false
simp_enterprise_el::users::expire: false
simp_enterprise_el::users::remove_uid_0: false
simp_enterprise_el::users::remove_dups: false
simp_enterprise_el::users::force_shadow: false
simp_enterprise_el::users::sa_nologin: false

simp_enterprise_el::users::nologin_shell: '/sbin/nologin'

simp_enterprise_el::users::sa_exclude:
  - root
  - sync
  - shutdown
  - halt

simp_enterprise_el::mountpoints::required_options: {}
simp_enterprise_el::mountpoints::removable_options: []

simp_enterprise_el::logfiles::enforce: false
simp_enterprise_el::logfiles::ignore:
  - '/lastlog$'
  - '/[buw]tmp$'
simp_enterprise_el::logfiles::mode: '0600'

simp_enterprise_el::grub::defaults:
  owner: 'root'
  group: 'root'
  mode: '0600'
simp_enterprise_el::grub::enforce: false

simp_enterprise_el::path::warn_to_stderr: false
simp_enterprise_el::path::log_facility: user.info
